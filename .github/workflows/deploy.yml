# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - scalable-webapp-prod-6789

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
    deploy:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        id-token: write
        contents: read
  
      steps:
        - name: Download artifact from build job
          uses: actions/download-artifact@v4
          with:
            name: node-app
  
        # ✅ Azure login
        - name: Login to Azure
          uses: azure/login@v2
          with:
            client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BA6A566972EE4B749591D0369D2D60F5 }}
            tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_067935D58E014875B93C94CF1816AC2E }}
            subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5F693A04767946C3AE0B69B6B03446ED }}
  
        # ✅ STEP 1 — Deploy to GREEN (staging slot)
        - name: Deploy to Staging Slot
          id: deploy-to-staging
          uses: azure/webapps-deploy@v3
          with:
            app-name: 'scalable-webapp-prod-6789'
            slot-name: 'staging'
            package: .
  
        # ✅ STEP 2 — Warmup + health check
        - name: Health Check Staging
          run: |
            echo "Waiting for staging warmup..."
            sleep 40
            curl -f https://scalable-webapp-prod-6789-staging.azurewebsites.net/health
  
        # ✅ STEP 3 — BLUE-GREEN SWAP
        - name: Swap Staging to Production
          run: |
            az webapp deployment slot swap \
              --name scalable-webapp-prod-6789 \
              --resource-group <YOUR_RESOURCE_GROUP> \
              --slot staging \
              --target-slot production
